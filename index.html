<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAT Maker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">B</div>
                <span class="brand-name">BRAT</span>
            </div>

            <nav class="sidebar-nav">
                <p class="nav-label">Tools</p>
                <button class="nav-item active" data-type="image">
                    <span class="nav-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                    </span>
                    <span class="nav-text">BRAT Image</span>
                </button>
                <button class="nav-item" data-type="video">
                    <span class="nav-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="23 7 16 12 23 17 23 7"/>
                            <rect x="1" y="5" width="15" height="14" rx="2"/>
                        </svg>
                    </span>
                    <span class="nav-text">BRAT Video</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <p class="footer-text">BRAT Maker v1.0</p>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-wrapper">
            <!-- Top bar -->
            <header class="topbar">
                <div class="topbar-title">
                    <span id="topbar-label">Generate BRAT Image</span>
                </div>
            </header>

            <!-- Content area -->
            <div class="content-area">
                <!-- Left: Form panel -->
                <div class="form-panel">
                    <!-- Image Panel -->
                    <div class="panel-content active" id="image-panel">
                        <div class="form-section">
                            <label class="form-label" for="image-text">Teks untuk BRAT</label>
                            <input
                                type="text"
                                id="image-text"
                                class="form-input"
                                placeholder="Masukkan teks kamu..."
                                autocomplete="off"
                            >
                            <p class="form-hint">Teks akan dirender sebagai BRAT album cover style.</p>
                        </div>

                        <button class="generate-btn" id="generate-image-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                            </svg>
                            Generate Image
                        </button>
                    </div>

                    <!-- Video Panel -->
                    <div class="panel-content" id="video-panel">
                        <div class="form-section">
                            <label class="form-label" for="video-text">Teks untuk BRAT</label>
                            <input
                                type="text"
                                id="video-text"
                                class="form-input"
                                placeholder="Masukkan teks kamu..."
                                autocomplete="off"
                            >
                            <p class="form-hint">Teks akan dirender sebagai BRAT video animasi.</p>
                        </div>

                        <button class="generate-btn" id="generate-video-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                            </svg>
                            Generate Video
                        </button>
                    </div>
                </div>

                <!-- Right: Result panel -->
                <div class="result-panel">
                    <div class="result-header">
                        <span class="result-title">Hasil</span>
                        <button class="download-btn" id="download-btn" style="display:none">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            Download
                        </button>
                    </div>
                    <div class="result-body" id="result-container">
                        <div class="result-empty">
                            <div class="empty-icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                                    <circle cx="8.5" cy="8.5" r="1.5"/>
                                    <polyline points="21 15 16 10 5 21"/>
                                </svg>
                            </div>
                            <p>Hasil akan muncul di sini</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
